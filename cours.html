<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'arbre du savoir — Curiosita</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
<style>
:root {
  --accent: #e8c97a;
  --bg: #0c0c0e;
  --surface: #141418;
  --surface2: #1c1c22;
  --text: #f0ede8;
  --muted: #7a7870;
  --border: rgba(240,237,232,0.08);
}
html, body { overflow: hidden; height: 100%; }

/* ── Toolbar ── */
.toolbar {
  position: fixed;
  top: 52px; left: 0; right: 0;
  z-index: 90;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 1.5rem;
  background: rgba(12,12,14,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.toolbar-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--accent);
  margin-right: auto;
}
.toolbar-search {
  position: relative;
  flex: 0 1 320px;
}
.toolbar-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  padding: 0.45rem 0.8rem 0.45rem 2rem;
  outline: none;
  transition: border-color 0.3s;
}
.toolbar-search input::placeholder { color: var(--muted); }
.toolbar-search input:focus { border-color: var(--accent); }
.toolbar-search .ts-icon {
  position: absolute; left: 0.6rem; top: 50%; transform: translateY(-50%);
  font-size: 0.75rem; color: var(--muted); pointer-events: none;
}
.tool-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  width: 30px; height: 30px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.85rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.tool-btn:hover { border-color: var(--accent); color: var(--text); }
.zoom-label {
  font-size: 0.68rem;
  color: var(--muted);
  min-width: 36px;
  text-align: center;
}
.tool-sep {
  width: 1px; height: 18px;
  background: var(--border);
  margin: 0 0.2rem;
}

/* ── Tree viewport ── */
.tree-viewport {
  position: fixed;
  top: 92px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  cursor: grab;
  background: var(--bg);
}
.tree-viewport:active { cursor: grabbing; }
.tree-viewport canvas {
  position: absolute;
  top: 0; left: 0;
}

/* ── Tooltip ── */
.tree-tooltip {
  position: fixed;
  z-index: 200;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.5rem 0.8rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 300px;
}
.tree-tooltip.visible { opacity: 1; }
.tt-name {
  font-family: 'Playfair Display', serif;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.15rem;
}
.tt-cat {
  font-size: 0.7rem;
  color: var(--muted);
}
.tt-type {
  font-size: 0.58rem;
  display: inline-block;
  padding: 0.08rem 0.35rem;
  border-radius: 3px;
  background: var(--border);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 0.2rem;
}

/* ── Legend ── */
.tree-legend {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 80;
  background: rgba(20,20,24,0.9);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.8rem 1rem;
  font-size: 0.68rem;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.legend-row {
  display: flex; align-items: center; gap: 0.5rem;
}
.legend-dot {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}

/* ── Stats badge ── */
.stats-badge {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 80;
  background: rgba(20,20,24,0.9);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 1rem;
  display: flex;
  gap: 1.2rem;
}
.sb-item { text-align: center; }
.sb-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 900;
  color: var(--accent);
  line-height: 1;
}
.sb-lab {
  font-size: 0.55rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-top: 0.15rem;
}

/* ── Loading ── */
.tree-loading {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 100;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  color: var(--muted);
}
.loading-sub {
  font-size: 0.72rem;
  color: var(--muted);
  opacity: 0.6;
  margin-top: 0.3rem;
}

/* Minimap */
.minimap {
  position: fixed;
  bottom: 1.5rem;
  right: 50%;
  transform: translateX(50%);
  z-index: 80;
  background: rgba(20,20,24,0.85);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.minimap canvas {
  display: block;
}
.minimap-view {
  position: absolute;
  border: 1px solid var(--accent);
  background: rgba(232,201,122,0.08);
  pointer-events: none;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .toolbar { padding: 0.4rem 0.8rem; gap: 0.4rem; }
  .toolbar-title { font-size: 0.85rem; }
  .toolbar-search { flex: 0 1 200px; }
  .toolbar-search input { font-size: 0.75rem; padding: 0.4rem 0.6rem 0.4rem 1.6rem; }
  .tree-legend, .stats-badge { display: none; }
  .minimap { bottom: 0.8rem; }
}
@media (max-width: 480px) {
  .toolbar-title { display: none; }
  .toolbar-search { flex: 1; }
  .zoom-label { display: none; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Curiosita.</a>
  <div class="breadcrumb">
    <a href="index.html">Accueil</a> › <span>L'arbre du savoir</span>
  </div>
</nav>

<div class="toolbar">
  <span class="toolbar-title">L'arbre du savoir</span>
  <div class="toolbar-search">
    <span class="ts-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un cours…" autocomplete="off">
  </div>
  <div class="tool-sep"></div>
  <button class="tool-btn" onclick="zoomIn()" title="Zoom +">+</button>
  <span class="zoom-label" id="zoomLabel">100%</span>
  <button class="tool-btn" onclick="zoomOut()" title="Zoom −">−</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" onclick="resetView()" title="Recentrer">⟲</button>
  <button class="tool-btn" onclick="fitThemes()" title="Vue thèmes">◫</button>
  <button class="tool-btn" onclick="fitAll()" title="Voir tout">⊞</button>
</div>

<div class="tree-viewport" id="viewport">
  <canvas id="treeCanvas"></canvas>
</div>

<div class="tree-tooltip" id="tooltip">
  <div class="tt-name" id="ttName"></div>
  <div class="tt-cat" id="ttCat"></div>
  <span class="tt-type" id="ttType"></span>
</div>

<div class="tree-loading" id="loadingState">
  <div class="loading-spinner"></div>
  <div class="loading-text">Construction de l'arbre…</div>
  <div class="loading-sub" id="loadingProgress">Chargement des thèmes</div>
</div>

<div class="tree-legend" id="legendBox">
  <div class="legend-row"><div class="legend-dot" style="background:#4fc3f7"></div> Sciences exactes</div>
  <div class="legend-row"><div class="legend-dot" style="background:#7ae8d8"></div> Sciences de la nature</div>
  <div class="legend-row"><div class="legend-dot" style="background:#7ae88a"></div> Sciences humaines</div>
  <div class="legend-row"><div class="legend-dot" style="background:#9b7ae8"></div> Lettres & Langues</div>
  <div class="legend-row"><div class="legend-dot" style="background:#e87a7a"></div> Arts & Culture</div>
  <div class="legend-row"><div class="legend-dot" style="background:#e87a9b"></div> Droit & Politique</div>
  <div class="legend-row"><div class="legend-dot" style="background:#8ae87a"></div> Savoir-faire</div>
</div>

<div class="stats-badge" id="statsBadge" style="display:none">
  <div class="sb-item"><div class="sb-val" id="sbDisc">0</div><div class="sb-lab">Disciplines</div></div>
  <div class="sb-item"><div class="sb-val" id="sbDom">0</div><div class="sb-lab">Domaines</div></div>
  <div class="sb-item"><div class="sb-val" id="sbCours">0</div><div class="sb-lab">Cours</div></div>
</div>

<div class="minimap" id="minimap" style="display:none">
  <canvas id="minimapCanvas" width="180" height="100"></canvas>
  <div class="minimap-view" id="minimapView"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   L'ARBRE DU SAVOIR — Interactive tree canvas
   Horizontal tree: root → themes → disciplines → domains → courses
   Pan/zoom/click/search
   ═══════════════════════════════════════════════ */

const THEMES = [
  { page: 'sciences-exactes.html', name: 'Sciences exactes & Informatique', icon: '🔬', color: '#4fc3f7' },
  { page: 'sciences-nature.html', name: 'Sciences de la nature', icon: '🌱', color: '#7ae8d8' },
  { page: 'sciences-humaines.html', name: 'Sciences humaines & sociales', icon: '🌍', color: '#7ae88a' },
  { page: 'lettres-langues.html', name: 'Lettres, Langues & Philosophie', icon: '📚', color: '#9b7ae8' },
  { page: 'arts-culture.html', name: 'Arts & Culture', icon: '🎨', color: '#e87a7a' },
  { page: 'droit-politique.html', name: 'Droit, Politique & Société', icon: '⚖️', color: '#e87a9b' },
  { page: 'savoir-faire.html', name: 'Savoir-faire & Vie pratique', icon: '🔧', color: '#8ae87a' }
];

// ── Data structures ──
let treeRoot = null;
let allNodes = []; // flat list for hit testing
let searchData = [];

// ── Canvas state ──
const canvas = document.getElementById('treeCanvas');
const ctx = canvas.getContext('2d');
let dpr = window.devicePixelRatio || 1;
let viewW, viewH;
let panX = 0, panY = 0, scale = 0.8;
let isDragging = false, dragStartX, dragStartY, panStartX, panStartY;
let hoveredNode = null;
let highlightedNodes = new Set();

// ── Layout constants ──
const LEVEL_SPACING = 240;
const NODE_HEIGHTS = { root: 42, theme: 36, discipline: 30, domain: 26, course: 20 };
const V_GAPS = { root: 24, theme: 14, discipline: 6, domain: 3 };
const NODE_WIDTHS = { root: 170, theme: 210, discipline: 145, domain: 125, course: 155 };
const FONT_SIZES = { root: 16, theme: 13.5, discipline: 11.5, domain: 10.5, course: 10 };
const NODE_RADIUS = { root: 8, theme: 6, discipline: 5, domain: 4, course: 3 };

// ── Data fetching ──

async function fetchDoc(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return new DOMParser().parseFromString(await r.text(), 'text/html');
}

function resolveUrl(href, base) {
  if (href.startsWith('/') || href.startsWith('http')) return href;
  const dir = base.includes('/') ? base.substring(0, base.lastIndexOf('/') + 1) : '';
  return dir + href;
}

function extractCards(doc, base) {
  const out = [];
  doc.querySelectorAll('.course-card[href]').forEach(c => {
    const href = c.getAttribute('href');
    const name = c.querySelector('h3')?.textContent?.trim();
    if (name && href) out.push({ name, url: resolveUrl(href, base) });
  });
  return out;
}

async function buildTree() {
  const prog = document.getElementById('loadingProgress');
  const root = { name: 'Curiosita', type: 'root', url: 'index.html', color: '#e8c97a', icon: '∞', children: [] };

  // 1. Fetch theme pages
  prog.textContent = 'Chargement des 7 thèmes…';
  const themeResults = await Promise.allSettled(THEMES.map(async t => {
    const node = { name: t.name, type: 'theme', url: t.page, color: t.color, icon: t.icon, children: [] };
    try {
      const doc = await fetchDoc(t.page);
      const cards = extractCards(doc, t.page);
      for (const c of cards) {
        if (c.url.endsWith('-page.html')) {
          node.children.push({ name: c.name, type: 'discipline', url: c.url, color: t.color, children: [] });
        }
      }
    } catch(e) {}
    return node;
  }));

  for (const r of themeResults) {
    if (r.status === 'fulfilled') root.children.push(r.value);
  }

  // 2. Fetch discipline pages
  prog.textContent = 'Chargement des disciplines…';
  const discFetches = [];
  for (const theme of root.children) {
    for (const disc of theme.children) {
      discFetches.push(fetchDoc(disc.url).then(doc => {
        const hubs = extractCards(doc, disc.url);
        disc.children = hubs.map(h => ({ name: h.name, type: 'domain', url: h.url, color: disc.color, children: [] }));
      }).catch(() => {}));
    }
  }
  await Promise.allSettled(discFetches);

  // 3. Fetch hub pages
  prog.textContent = 'Chargement des domaines et cours…';
  const hubFetches = [];
  for (const theme of root.children) {
    for (const disc of theme.children) {
      for (const hub of disc.children) {
        hubFetches.push(fetchDoc(hub.url).then(doc => {
          const courses = extractCards(doc, hub.url);
          hub.children = courses.map(c => ({ name: c.name, type: 'course', url: c.url, color: hub.color, children: [] }));
        }).catch(() => {}));
      }
    }
  }
  await Promise.allSettled(hubFetches);

  return root;
}

// ── Layout algorithm ──

function layoutTree(node) {
  allNodes = [];

  function computeHeight(n, depth) {
    n.depth = depth;
    n.nodeH = NODE_HEIGHTS[n.type] || 20;
    n.nodeW = NODE_WIDTHS[n.type] || 120;

    allNodes.push(n);

    if (!n.children || n.children.length === 0) {
      n.subtreeH = n.nodeH;
      return;
    }

    const gap = V_GAPS[n.type] || 3;
    let total = 0;
    for (let i = 0; i < n.children.length; i++) {
      computeHeight(n.children[i], depth + 1);
      if (i > 0) total += gap;
      total += n.children[i].subtreeH;
    }
    n.subtreeH = Math.max(n.nodeH, total);
  }

  function assignPos(n, x, y) {
    n.x = x;
    n.y = y + n.subtreeH / 2 - n.nodeH / 2;

    if (!n.children || n.children.length === 0) return;

    const gap = V_GAPS[n.type] || 3;
    let cy = y;
    for (const child of n.children) {
      assignPos(child, x + LEVEL_SPACING, cy);
      cy += child.subtreeH + gap;
    }
  }

  computeHeight(node, 0);
  assignPos(node, 60, 60);
}

// ── Rendering ──

function resizeCanvas() {
  const vp = document.getElementById('viewport');
  viewW = vp.clientWidth;
  viewH = vp.clientHeight;
  canvas.width = viewW * dpr;
  canvas.height = viewH * dpr;
  canvas.style.width = viewW + 'px';
  canvas.style.height = viewH + 'px';
}

function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, viewW, viewH);

  // Apply pan/zoom
  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(scale, scale);

  if (!treeRoot) { ctx.restore(); return; }

  // Draw connections
  drawConnections(treeRoot);

  // Draw nodes
  drawNodes(treeRoot);

  ctx.restore();

  // Update minimap
  renderMinimap();
}

function drawConnections(n) {
  if (!n.children || n.children.length === 0) return;

  for (const child of n.children) {
    const x1 = n.x + n.nodeW;
    const y1 = n.y + n.nodeH / 2;
    const x2 = child.x;
    const y2 = child.y + child.nodeH / 2;
    const midX = (x1 + x2) / 2;

    const isHL = highlightedNodes.size > 0 && highlightedNodes.has(child);
    const alpha = isHL ? '90' : (highlightedNodes.size > 0 ? '12' : '35');
    const lw = isHL
      ? ({ root: 3, theme: 2.5, discipline: 2, domain: 1.5 }[n.type] || 1)
      : ({ root: 2, theme: 1.5, discipline: 1, domain: 0.7 }[n.type] || 0.5);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.bezierCurveTo(midX, y1, midX, y2, x2, y2);
    ctx.strokeStyle = child.color + alpha;
    ctx.lineWidth = lw;
    ctx.stroke();

    drawConnections(child);
  }
}

function drawNodes(n) {
  const isHL = highlightedNodes.size > 0 && highlightedNodes.has(n);
  const isDimmed = highlightedNodes.size > 0 && !isHL;
  const isHovered = n === hoveredNode;

  const radius = NODE_RADIUS[n.type] || 3;
  const fontSize = FONT_SIZES[n.type] || 10;

  // Background
  ctx.beginPath();
  roundRect(ctx, n.x, n.y, n.nodeW, n.nodeH, radius);

  if (isHovered) {
    ctx.fillStyle = n.color + '40';
    ctx.strokeStyle = n.color + 'cc';
    ctx.lineWidth = 1.5;
  } else if (isHL) {
    ctx.fillStyle = n.color + '25';
    ctx.strokeStyle = n.color + '80';
    ctx.lineWidth = 1;
  } else if (isDimmed) {
    ctx.fillStyle = 'rgba(20,20,24,0.6)';
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 0.5;
  } else if (n.type === 'theme') {
    ctx.fillStyle = n.color + '28';
    ctx.strokeStyle = n.color + '80';
    ctx.lineWidth = 1.2;
  } else if (n.type === 'root') {
    ctx.fillStyle = n.color + '22';
    ctx.strokeStyle = n.color + '90';
    ctx.lineWidth = 1.5;
  } else {
    ctx.fillStyle = n.color + '18';
    ctx.strokeStyle = n.color + '50';
    ctx.lineWidth = 0.8;
  }
  ctx.fill();
  ctx.stroke();

  // Glow for hovered
  if (isHovered) {
    ctx.save();
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    roundRect(ctx, n.x, n.y, n.nodeW, n.nodeH, radius);
    ctx.strokeStyle = n.color + '60';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // Text
  const textAlpha = isDimmed ? '50' : 'e0';
  ctx.fillStyle = '#f0ede8' + textAlpha;

  if (n.type === 'root') {
    ctx.font = `italic 900 ${fontSize}px 'Playfair Display', serif`;
  } else if (n.type === 'theme') {
    ctx.font = `700 ${fontSize}px 'Playfair Display', serif`;
  } else if (n.type === 'discipline') {
    ctx.font = `italic 700 ${fontSize}px 'DM Sans', sans-serif`;
  } else {
    ctx.font = `400 ${fontSize}px 'DM Sans', sans-serif`;
  }
  ctx.textBaseline = 'middle';

  const maxTextW = n.nodeW - 12;
  let label = n.icon ? n.icon + ' ' + n.name : n.name;
  if (n.type === 'discipline' || n.type === 'domain' || n.type === 'course') label = n.name;

  // Truncate if needed
  let displayText = label;
  while (ctx.measureText(displayText).width > maxTextW && displayText.length > 3) {
    displayText = displayText.slice(0, -2) + '…';
  }

  ctx.fillText(displayText, n.x + 6, n.y + n.nodeH / 2);

  // Children count for non-leaf nodes
  if (n.children && n.children.length > 0 && n.type !== 'root') {
    const countText = '' + n.children.length;
    ctx.font = `500 ${fontSize * 0.7}px 'DM Sans', sans-serif`;
    const cw = ctx.measureText(countText).width;
    ctx.fillStyle = n.color + (isDimmed ? '30' : '80');
    ctx.fillText(countText, n.x + n.nodeW - cw - 6, n.y + n.nodeH / 2);
  }

  // Recurse
  if (n.children) n.children.forEach(c => drawNodes(c));
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Minimap ──

function renderMinimap() {
  if (!treeRoot) return;
  const mc = document.getElementById('minimapCanvas');
  const mctx = mc.getContext('2d');
  const mw = 180, mh = 100;

  // Tree bounds
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of allNodes) {
    minX = Math.min(minX, n.x);
    maxX = Math.max(maxX, n.x + n.nodeW);
    minY = Math.min(minY, n.y);
    maxY = Math.max(maxY, n.y + n.nodeH);
  }

  const treeW = maxX - minX + 100;
  const treeH = maxY - minY + 100;
  const sx = mw / treeW;
  const sy = mh / treeH;
  const ms = Math.min(sx, sy);

  mctx.clearRect(0, 0, mw, mh);

  // Draw dots for nodes
  for (const n of allNodes) {
    if (n.type === 'course') continue; // skip courses in minimap for clarity
    const x = (n.x - minX + 50) * ms;
    const y = (n.y - minY + 50) * ms;
    const s = n.type === 'root' ? 3 : n.type === 'theme' ? 2 : 1;
    mctx.fillStyle = n.color + '80';
    mctx.fillRect(x, y, s, s);
  }

  // Viewport rect
  const vpLeft = (-panX / scale - minX + 50) * ms;
  const vpTop = (-panY / scale - minY + 50) * ms;
  const vpW = (viewW / scale) * ms;
  const vpH = (viewH / scale) * ms;

  const mvEl = document.getElementById('minimapView');
  mvEl.style.left = Math.max(0, vpLeft) + 'px';
  mvEl.style.top = Math.max(0, vpTop) + 'px';
  mvEl.style.width = Math.min(vpW, mw) + 'px';
  mvEl.style.height = Math.min(vpH, mh) + 'px';
}

// ── Hit testing ──

function hitTest(screenX, screenY) {
  const worldX = (screenX - panX) / scale;
  const worldY = (screenY - panY) / scale;

  // Search from end (top-rendered nodes) to beginning
  for (let i = allNodes.length - 1; i >= 0; i--) {
    const n = allNodes[i];
    if (worldX >= n.x && worldX <= n.x + n.nodeW && worldY >= n.y && worldY <= n.y + n.nodeH) {
      return n;
    }
  }
  return null;
}

function getAncestors(node) {
  const set = new Set();
  set.add(node);
  // Walk up: find parent by searching all nodes
  function findParent(target) {
    for (const n of allNodes) {
      if (n.children && n.children.includes(target)) return n;
    }
    return null;
  }
  let current = node;
  while (current) {
    set.add(current);
    current = findParent(current);
  }
  // Also add all descendants
  function addDescendants(n) {
    set.add(n);
    if (n.children) n.children.forEach(addDescendants);
  }
  addDescendants(node);
  return set;
}

// ── Pan/Zoom ──

function zoomIn() { setScale(scale * 1.25); }
function zoomOut() { setScale(scale / 1.25); }

function setScale(newScale, pivotX, pivotY) {
  newScale = Math.max(0.05, Math.min(3, newScale));
  if (pivotX === undefined) { pivotX = viewW / 2; pivotY = viewH / 2; }

  const worldX = (pivotX - panX) / scale;
  const worldY = (pivotY - panY) / scale;

  scale = newScale;
  panX = pivotX - worldX * scale;
  panY = pivotY - worldY * scale;

  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
  render();
}

function resetView() {
  if (!treeRoot) return;
  // Center on root, showing themes + first disciplines
  scale = 0.55;
  panX = 40;
  panY = viewH / 2 - (treeRoot.y + treeRoot.nodeH / 2) * scale;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
  render();
}

function fitAll() {
  if (!allNodes.length) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of allNodes) {
    minX = Math.min(minX, n.x);
    maxX = Math.max(maxX, n.x + n.nodeW);
    minY = Math.min(minY, n.y);
    maxY = Math.max(maxY, n.y + n.nodeH);
  }
  const treeW = maxX - minX + 120;
  const treeH = maxY - minY + 120;
  scale = Math.min(viewW / treeW, viewH / treeH, 1.5);
  panX = (viewW - treeW * scale) / 2 - (minX - 60) * scale;
  panY = (viewH - treeH * scale) / 2 - (minY - 60) * scale;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
  render();
}

function fitThemes() {
  // Zoom to show root + themes + disciplines (first 3 levels)
  if (!allNodes.length) return;
  const lvl2 = allNodes.filter(n => n.depth <= 2);
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const n of lvl2) {
    minX = Math.min(minX, n.x);
    maxX = Math.max(maxX, n.x + n.nodeW);
    minY = Math.min(minY, n.y);
    maxY = Math.max(maxY, n.y + n.nodeH);
  }
  const treeW = maxX - minX + 120;
  const treeH = maxY - minY + 120;
  scale = Math.min(viewW / treeW, viewH / treeH, 1);
  panX = (viewW - treeW * scale) / 2 - (minX - 60) * scale;
  panY = (viewH - treeH * scale) / 2 - (minY - 60) * scale;
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
  render();
}

// ── Event handlers ──

const viewport = document.getElementById('viewport');
const tooltip = document.getElementById('tooltip');

viewport.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});

window.addEventListener('mousemove', e => {
  if (isDragging) {
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    render();
    return;
  }

  // Hit test for hover
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const node = hitTest(mx, my);

  if (node !== hoveredNode) {
    hoveredNode = node;
    if (node) {
      highlightedNodes = getAncestors(node);
      document.getElementById('ttName').textContent = (node.icon ? node.icon + ' ' : '') + node.name;
      document.getElementById('ttCat').textContent = node.type === 'root' ? 'Racine' : node.url;
      document.getElementById('ttType').textContent = node.type;
      viewport.style.cursor = 'pointer';
    } else {
      highlightedNodes = new Set();
      viewport.style.cursor = 'grab';
    }
    render();
  }

  if (hoveredNode) {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
});

window.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    if (!hoveredNode) viewport.style.cursor = 'grab';
  }
});

viewport.addEventListener('click', e => {
  if (Math.abs(e.clientX - dragStartX) > 4 || Math.abs(e.clientY - dragStartY) > 4) return; // was a drag
  const rect = canvas.getBoundingClientRect();
  const node = hitTest(e.clientX - rect.left, e.clientY - rect.top);
  if (node && node.url) {
    window.location.href = node.url;
  }
});

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  setScale(scale * factor, mx, my);
}, { passive: false });

// Touch support
let lastTouchDist = 0;
let lastTouchMid = null;

viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    panStartX = panX;
    panStartY = panY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    lastTouchDist = Math.hypot(dx, dy);
    lastTouchMid = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
  }
}, { passive: true });

viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    panX = panStartX + (e.touches[0].clientX - dragStartX);
    panY = panStartY + (e.touches[0].clientY - dragStartY);
    render();
  } else if (e.touches.length === 2) {
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;
    const dist = Math.hypot(dx, dy);
    const mid = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
    if (lastTouchDist > 0) {
      const rect = canvas.getBoundingClientRect();
      setScale(scale * (dist / lastTouchDist), mid.x - rect.left, mid.y - rect.top);
    }
    lastTouchDist = dist;
    lastTouchMid = mid;
  }
}, { passive: false });

viewport.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

// ── Search ──

const searchInput = document.getElementById('searchInput');
function normalize(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

searchInput.addEventListener('input', () => {
  const q = normalize(searchInput.value.trim());
  if (!q) {
    highlightedNodes = new Set();
    render();
    return;
  }

  const words = q.split(/\s+/).filter(Boolean);
  const matches = new Set();

  for (const n of allNodes) {
    const nn = normalize(n.name);
    let match = true;
    for (const w of words) {
      if (!nn.includes(w)) { match = false; break; }
    }
    if (match) {
      // Add this node and its ancestors
      matches.add(n);
      let current = n;
      function findParent(target) {
        for (const nd of allNodes) {
          if (nd.children && nd.children.includes(target)) return nd;
        }
        return null;
      }
      while (current) {
        matches.add(current);
        current = findParent(current);
      }
    }
  }

  highlightedNodes = matches;
  render();

  // Pan to first match
  if (matches.size > 0) {
    const matchArr = [...matches].filter(n => {
      const nn = normalize(n.name);
      return words.every(w => nn.includes(w));
    });
    if (matchArr.length > 0) {
      const target = matchArr[0];
      const targetScreenX = target.x * scale + panX;
      const targetScreenY = target.y * scale + panY;
      if (targetScreenX < 0 || targetScreenX > viewW || targetScreenY < 0 || targetScreenY > viewH) {
        panX = viewW / 3 - target.x * scale;
        panY = viewH / 2 - target.y * scale;
        render();
      }
    }
  }
});

// ── Resize handler ──
window.addEventListener('resize', () => {
  dpr = window.devicePixelRatio || 1;
  resizeCanvas();
  render();
});

// ── Init ──
async function init() {
  resizeCanvas();

  // Check session cache
  const cached = sessionStorage.getItem('curiosita_tree');
  if (cached) {
    try {
      const { root, ts } = JSON.parse(cached);
      if (Date.now() - ts < 10 * 60 * 1000) {
        treeRoot = root;
        layoutTree(treeRoot);
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('statsBadge').style.display = '';
        document.getElementById('minimap').style.display = '';
        updateStats();
        resetView();
        return;
      }
    } catch(e) {}
  }

  treeRoot = await buildTree();
  layoutTree(treeRoot);

  // Cache
  try {
    sessionStorage.setItem('curiosita_tree', JSON.stringify({ root: treeRoot, ts: Date.now() }));
  } catch(e) {}

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('statsBadge').style.display = '';
  document.getElementById('minimap').style.display = '';
  updateStats();
  resetView();
}

function updateStats() {
  let disc = 0, dom = 0, cours = 0;
  for (const n of allNodes) {
    if (n.type === 'discipline') disc++;
    if (n.type === 'domain') dom++;
    if (n.type === 'course') cours++;
  }
  document.getElementById('sbDisc').textContent = disc;
  document.getElementById('sbDom').textContent = dom;
  document.getElementById('sbCours').textContent = cours;
}

init();
</script>
