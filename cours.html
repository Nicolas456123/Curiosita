<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tous les cours — Curiosita</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
<style>
/* ── Page layout ── */
.page-header {
  padding: 6rem 3rem 1.5rem;
  max-width: 1200px;
  margin: 0 auto;
}
.page-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.page-sub {
  color: var(--muted);
  font-size: 0.92rem;
}

/* ── Toolbar ── */
.toolbar {
  position: sticky;
  top: 52px;
  z-index: 90;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 3rem;
  background: rgba(12,12,14,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.toolbar-search {
  position: relative;
  flex: 0 1 320px;
}
.toolbar-search .ts-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem;
  pointer-events: none;
}
.toolbar-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.82rem;
  padding: 0.4rem 0.6rem 0.4rem 2rem;
  outline: none;
  transition: border-color 0.2s;
}
.toolbar-search input:focus {
  border-color: var(--accent);
}
.tool-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 0.15rem;
}
.tool-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.75rem;
  padding: 0.35rem 0.7rem;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  transition: all 0.2s;
  white-space: nowrap;
}
.tool-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.search-count {
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: 0.3rem;
}

/* ── Stats badge ── */
.stats-badge {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 80;
  display: flex;
  gap: 1.2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 1.2rem;
}
.sb-item { text-align: center; }
.sb-val {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.3rem;
  color: var(--accent);
}
.sb-lab {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

/* ── Themes grid ── */
.themes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  max-width: 1200px;
  margin: 1.5rem auto 6rem;
}

/* ── Theme card ── */
.theme-card {
  background: var(--bg);
  padding: 2.2rem;
  cursor: pointer;
  transition: background 0.3s;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  display: block;
}
.theme-card::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-accent, var(--accent));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
.theme-card:hover { background: var(--surface); }
.theme-card:hover::before { transform: scaleX(1); }

.theme-icon {
  font-size: 1.8rem;
  margin-bottom: 1rem;
  display: block;
  transition: transform 0.3s;
}
.theme-card:hover .theme-icon { transform: scale(1.15); }

.theme-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
}
.theme-desc {
  color: var(--muted);
  font-size: 0.85rem;
  line-height: 1.7;
  margin-bottom: 1.2rem;
}
.theme-topics {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}
.topic-chip {
  font-size: 0.7rem;
  padding: 0.2rem 0.55rem;
  background: var(--surface2);
  border-radius: 3px;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.theme-arrow {
  position: absolute;
  top: 2.2rem; right: 2.2rem;
  width: 26px; height: 26px;
  border: 1px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: var(--muted);
  opacity: 0;
  transform: translateX(-6px);
  transition: all 0.3s;
}
.theme-card:hover .theme-arrow {
  opacity: 1;
  transform: translateX(0);
}

/* ── Expanded card + tree ── */
.theme-card.expanded {
  grid-column: 1 / -1;
  background: var(--surface);
  cursor: default;
}
.theme-card.expanded::before { transform: scaleX(1); }
.theme-card.expanded .theme-topics { display: none; }
.theme-card.expanded .theme-arrow { display: none; }

.tree-container {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
  margin-top: 1.5rem;
  border-top: 1px solid var(--border);
  padding-top: 0;
}
.tree-container.open {
  padding-top: 1rem;
}

.tree-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}
.tree-theme-link {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--card-accent, #e8c97a);
  text-decoration: none;
  transition: color 0.2s;
}
.tree-theme-link:hover { color: var(--text); text-decoration: underline; }

.tree-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.tree-close:hover { border-color: var(--card-accent, #e8c97a); color: var(--text); }

/* ── Tree nodes ── */
.tree-node { margin-bottom: 0.15rem; }
.tree-node-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.45rem 0.4rem;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.tree-node-header:hover { background: var(--surface2); }

.tree-chevron {
  font-size: 0.5rem;
  color: var(--muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
  width: 12px;
  text-align: center;
}
.tree-chevron.open { transform: rotate(90deg); }

.tree-node-icon { font-size: 0.95rem; flex-shrink: 0; }

.tree-node-name {
  font-size: 0.88rem;
  color: var(--text);
  text-decoration: none;
}
.tree-node-name:hover { color: var(--card-accent, #e8c97a); }

.tree-subject > .tree-node-header .tree-node-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 0.95rem;
}

.tree-node-count {
  font-size: 0.65rem;
  color: var(--muted);
  margin-left: auto;
  letter-spacing: 0.03em;
}

.tree-children {
  padding-left: 1.1rem;
  border-left: 1px solid var(--border);
  margin-left: 0.55rem;
}

.tree-leaf { padding: 0.15rem 0; }
.tree-course-link {
  display: flex;
  align-items: center;
  gap: 0.45rem;
  font-size: 0.8rem;
  color: var(--muted);
  text-decoration: none;
  padding: 0.25rem 0.4rem;
  border-radius: 3px;
  transition: all 0.15s;
}
.tree-course-link:hover {
  color: var(--card-accent, #e8c97a);
  background: rgba(255,255,255,0.03);
}
.tree-leaf-bullet { color: var(--border); font-size: 0.55rem; }

.tree-empty {
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
  padding: 1rem 0;
}

/* ── Search highlights ── */
.tree-node-header.search-match { background: rgba(232,201,122,0.08); }
.tree-node-header.search-match .tree-node-name { color: var(--accent); }
.tree-course-link.search-match { color: var(--accent); background: rgba(232,201,122,0.06); }

/* ── Dim non-matches during search ── */
.tree-node-header.search-dim { opacity: 0.35; }
.tree-course-link.search-dim { opacity: 0.35; }

/* ── Loading ── */
.page-loading {
  text-align: center;
  padding: 4rem 2rem;
  max-width: 1200px;
  margin: 0 auto;
}
.loading-spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 0.8rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.85rem; color: var(--muted); }
.loading-sub { font-size: 0.7rem; color: var(--muted); opacity: 0.6; margin-top: 0.2rem; }

/* ── No results ── */
.no-results {
  text-align: center;
  padding: 3rem 2rem;
  display: none;
}
.no-results-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.no-results-text { color: var(--muted); font-size: 0.9rem; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .page-header { padding: 5.5rem 1.5rem 1rem; }
  .page-title { font-size: 1.6rem; }
  .toolbar { padding: 0.5rem 1rem; gap: 0.4rem; }
  .toolbar-search { flex: 1; }
  .tool-btn span { display: none; }
  .themes-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); margin: 1rem 0 4rem; }
  .theme-card { padding: 1.5rem; }
  .stats-badge { display: none; }
}
@media (max-width: 480px) {
  .page-header { padding: 5rem 1rem 0.8rem; }
  .themes-grid { grid-template-columns: 1fr; }
  .theme-card { padding: 1.2rem; }
  .tree-children { padding-left: 0.7rem; margin-left: 0.35rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Curiosita.</a>
  <div class="breadcrumb">
    <a href="index.html">Accueil</a> › <span>Tous les cours</span>
  </div>
</nav>

<div class="page-header">
  <h1 class="page-title">Tous les cours</h1>
  <p class="page-sub">Explorez l'ensemble des disciplines, domaines et cours disponibles.</p>
</div>

<div class="toolbar" id="toolbar">
  <div class="toolbar-search">
    <span class="ts-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un cours, un domaine…" autocomplete="off">
  </div>
  <span class="search-count" id="searchCount"></span>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btnOpenAll">📂 <span>Tout ouvrir</span></button>
  <button class="tool-btn" id="btnCloseAll">📁 <span>Tout fermer</span></button>
</div>

<div class="page-loading" id="loadingState">
  <div class="loading-spinner"></div>
  <div class="loading-text">Construction de l'arborescence…</div>
  <div class="loading-sub" id="loadingProgress">Chargement des thèmes</div>
</div>

<div class="themes-grid" id="themesGrid" style="display:none"></div>

<div class="no-results" id="noResults">
  <div class="no-results-icon">🔎</div>
  <div class="no-results-text">Aucun résultat trouvé</div>
</div>

<div class="stats-badge" id="statsBadge" style="display:none">
  <div class="sb-item"><div class="sb-val" id="sbDisc">0</div><div class="sb-lab">Disciplines</div></div>
  <div class="sb-item"><div class="sb-val" id="sbDom">0</div><div class="sb-lab">Domaines</div></div>
  <div class="sb-item"><div class="sb-val" id="sbCours">0</div><div class="sb-lab">Cours</div></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   TOUS LES COURS — Card-based tree browser
   Theme cards → Disciplines → Domains → Courses
   Click to expand · Search · Open/Close all
   ═══════════════════════════════════════════════ */

const THEMES = [
  { page: 'sciences-exactes.html', name: 'Sciences exactes & Informatique', icon: '🔬', color: '#4fc3f7',
    desc: 'Mathématiques, informatique, physique, chimie — les fondements logiques et abstraits de la connaissance.' },
  { page: 'sciences-nature.html', name: 'Sciences de la nature', icon: '🌱', color: '#7ae8d8',
    desc: 'Biologie, physique du vivant, sciences de la Terre, astronomie — comprendre le monde naturel.' },
  { page: 'sciences-humaines.html', name: 'Sciences humaines & sociales', icon: '🌍', color: '#7ae88a',
    desc: 'Histoire, psychologie, économie, sociologie — comprendre l\'humain et la société.' },
  { page: 'lettres-langues.html', name: 'Lettres, Langues & Philosophie', icon: '📚', color: '#9b7ae8',
    desc: 'Les mots, les idées, la pensée critique — langues, littérature et philosophie.' },
  { page: 'arts-culture.html', name: 'Arts & Culture', icon: '🎨', color: '#e87a7a',
    desc: 'Arts visuels, musique, cinéma, spectacle vivant — l\'expression créative sous toutes ses formes.' },
  { page: 'droit-politique.html', name: 'Droit, Politique & Société', icon: '⚖️', color: '#e87a9b',
    desc: 'Les institutions, le droit, les systèmes politiques et les enjeux de la vie en société.' },
  { page: 'savoir-faire.html', name: 'Savoir-faire & Vie pratique', icon: '🔧', color: '#8ae87a',
    desc: 'Artisanat, cuisine, santé, gestion personnelle — les compétences pratiques du quotidien.' }
];

// ── State ──
let treeData = null; // { themes: [...] }
let isReady = false;

// ── Data fetching ──
async function fetchDoc(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return new DOMParser().parseFromString(await r.text(), 'text/html');
}

function resolveUrl(href, base) {
  if (href.startsWith('/') || href.startsWith('http')) return href;
  const dir = base.includes('/') ? base.substring(0, base.lastIndexOf('/') + 1) : '';
  return dir + href;
}

function extractCards(doc, base) {
  const out = [];
  doc.querySelectorAll('.course-card[href]').forEach(c => {
    const href = c.getAttribute('href');
    const name = c.querySelector('h3')?.textContent?.trim();
    const icon = c.querySelector('.course-icon')?.textContent?.trim() || '';
    if (name && href) out.push({ name, url: resolveUrl(href, base), icon });
  });
  return out;
}

async function buildTree() {
  const prog = document.getElementById('loadingProgress');
  const themes = [];

  prog.textContent = 'Chargement des thèmes…';
  const themeResults = await Promise.allSettled(THEMES.map(async t => {
    const node = { ...t, disciplines: [] };
    try {
      const doc = await fetchDoc(t.page);
      for (const c of extractCards(doc, t.page)) {
        if (c.url.endsWith('-page.html'))
          node.disciplines.push({ name: c.name, url: c.url, icon: c.icon, color: t.color, domains: [] });
      }
      // Also extract topic chips for the card
      node.topics = node.disciplines.map(d => d.name).slice(0, 5);
    } catch(e) {}
    return node;
  }));
  for (const r of themeResults) if (r.status === 'fulfilled') themes.push(r.value);

  prog.textContent = 'Chargement des disciplines…';
  const discFetches = [];
  for (const theme of themes) {
    for (const disc of theme.disciplines) {
      discFetches.push(fetchDoc(disc.url).then(doc => {
        disc.domains = extractCards(doc, disc.url).map(h => ({
          name: h.name, url: h.url, icon: h.icon, color: disc.color, courses: []
        }));
      }).catch(() => {}));
    }
  }
  await Promise.allSettled(discFetches);

  prog.textContent = 'Chargement des cours…';
  const hubFetches = [];
  for (const theme of themes)
    for (const disc of theme.disciplines)
      for (const dom of disc.domains)
        hubFetches.push(fetchDoc(dom.url).then(doc => {
          dom.courses = extractCards(doc, dom.url).map(c => ({
            name: c.name, url: c.url, icon: c.icon
          }));
        }).catch(() => {}));
  await Promise.allSettled(hubFetches);

  return { themes };
}

// ── Render cards ──
function renderGrid() {
  const grid = document.getElementById('themesGrid');
  grid.innerHTML = '';
  for (const t of treeData.themes) {
    const chips = (t.topics || t.disciplines.map(d => d.name).slice(0, 5))
      .map(n => `<span class="topic-chip">${n}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.style.cssText = `--card-accent:${t.color}`;
    card.dataset.theme = t.name;
    card.innerHTML = `
      <div class="theme-arrow">→</div>
      <span class="theme-icon">${t.icon}</span>
      <div class="theme-name">${t.name}</div>
      <p class="theme-desc">${t.desc}</p>
      <div class="theme-topics">${chips}</div>`;
    grid.appendChild(card);
  }
}

// ── Tree rendering for a theme ──
function renderCourse(c) {
  return `<div class="tree-leaf"><a href="${c.url}" class="tree-link tree-course-link"><span class="tree-leaf-bullet">•</span>${c.name}</a></div>`;
}

function renderDomain(d) {
  const n = d.courses.length;
  const coursesHtml = d.courses.map(renderCourse).join('');
  return `<div class="tree-node tree-domain">
    <div class="tree-node-header" data-toggle>
      <span class="tree-chevron">&#9654;</span>
      <a href="${d.url}" class="tree-link tree-node-name">${d.name}</a>
      <span class="tree-node-count">${n} cours</span>
    </div>
    <div class="tree-children" style="display:none">${coursesHtml}</div>
  </div>`;
}

function renderDiscipline(disc) {
  const n = disc.domains.length;
  const domainsHtml = disc.domains.map(renderDomain).join('');
  return `<div class="tree-node tree-subject">
    <div class="tree-node-header" data-toggle>
      <span class="tree-chevron">&#9654;</span>
      <span class="tree-node-icon">${disc.icon || '📖'}</span>
      <a href="${disc.url}" class="tree-link tree-node-name">${disc.name}</a>
      <span class="tree-node-count">${n} domaine${n > 1 ? 's' : ''}</span>
    </div>
    <div class="tree-children" style="display:none">${domainsHtml}</div>
  </div>`;
}

// ── Expand / collapse cards ──
function expandCard(card) {
  const themeName = card.dataset.theme;
  const theme = treeData.themes.find(t => t.name === themeName);
  if (!theme) return;

  card.classList.add('expanded');

  const container = document.createElement('div');
  container.className = 'tree-container';

  const disciplinesHtml = theme.disciplines.length
    ? theme.disciplines.map(renderDiscipline).join('')
    : '<div class="tree-empty">Aucune discipline disponible pour le moment.</div>';

  container.innerHTML = `
    <div class="tree-header">
      <a href="${theme.page}" class="tree-link tree-theme-link">Voir le thème complet →</a>
      <button class="tree-close" aria-label="Fermer">✕</button>
    </div>
    <div class="tree-body">${disciplinesHtml}</div>`;

  card.appendChild(container);
  requestAnimationFrame(() => {
    container.classList.add('open');
    container.style.maxHeight = container.scrollHeight + 'px';
    container.style.opacity = '1';
  });
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 120);
}

function collapseCard(card) {
  const container = card.querySelector('.tree-container');
  if (container) {
    container.style.maxHeight = '0';
    container.style.opacity = '0';
    container.classList.remove('open');
    container.addEventListener('transitionend', () => container.remove(), { once: true });
  }
  card.classList.remove('expanded');
}

function updateTreeHeight(el) {
  const container = el.closest('.tree-container');
  if (container) container.style.maxHeight = container.scrollHeight + 'px';
}

// ── Open / Close all ──
function openAllCards() {
  document.querySelectorAll('.theme-card').forEach(card => {
    if (!card.classList.contains('expanded')) expandCard(card);
  });
  // Also expand all tree nodes
  setTimeout(() => {
    document.querySelectorAll('.tree-children').forEach(ch => {
      ch.style.display = 'block';
      const chevron = ch.previousElementSibling?.querySelector('.tree-chevron');
      if (chevron) chevron.classList.add('open');
    });
    document.querySelectorAll('.tree-container').forEach(c => {
      c.style.maxHeight = c.scrollHeight + 'px';
    });
  }, 500);
}

function closeAllCards() {
  document.querySelectorAll('.theme-card.expanded').forEach(card => collapseCard(card));
}

// ── Search ──
function normalize(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

function performSearch(query) {
  const q = normalize(query.trim());
  const countEl = document.getElementById('searchCount');
  const noRes = document.getElementById('noResults');
  const grid = document.getElementById('themesGrid');

  if (!q) {
    // Clear search
    countEl.textContent = '';
    noRes.style.display = 'none';
    grid.style.display = '';
    // Remove all highlights
    document.querySelectorAll('.search-match, .search-dim').forEach(el => {
      el.classList.remove('search-match', 'search-dim');
    });
    return;
  }

  const words = q.split(/\s+/).filter(Boolean);
  let totalMatches = 0;
  let themesWithMatch = new Set();

  // Collapse all first, then expand matching
  closeAllCards();

  // Search across all themes
  for (const theme of treeData.themes) {
    let themeHasMatch = false;

    // Check theme name
    if (words.every(w => normalize(theme.name).includes(w))) {
      themeHasMatch = true;
      totalMatches++;
    }

    for (const disc of theme.disciplines) {
      let discMatch = words.every(w => normalize(disc.name).includes(w));
      if (discMatch) totalMatches++;

      for (const dom of disc.domains) {
        let domMatch = words.every(w => normalize(dom.name).includes(w));
        if (domMatch) totalMatches++;

        for (const course of dom.courses) {
          if (words.every(w => normalize(course.name).includes(w))) {
            totalMatches++;
            themeHasMatch = true;
          }
        }
        if (domMatch) themeHasMatch = true;
      }
      if (discMatch) themeHasMatch = true;
    }

    if (themeHasMatch) themesWithMatch.add(theme.name);
  }

  if (totalMatches === 0) {
    countEl.textContent = '0 résultat';
    noRes.style.display = 'block';
    grid.style.display = 'none';
    return;
  }

  countEl.textContent = totalMatches + ' résultat' + (totalMatches > 1 ? 's' : '');
  noRes.style.display = 'none';
  grid.style.display = '';

  // Expand matching theme cards and auto-open matching paths
  setTimeout(() => {
    const cards = document.querySelectorAll('.theme-card');
    cards.forEach(card => {
      const name = card.dataset.theme;
      if (themesWithMatch.has(name)) {
        if (!card.classList.contains('expanded')) expandCard(card);
      }
    });

    // After cards are expanded, highlight and expand matching branches
    setTimeout(() => {
      for (const theme of treeData.themes) {
        if (!themesWithMatch.has(theme.name)) continue;

        const card = document.querySelector(`.theme-card[data-theme="${CSS.escape(theme.name)}"]`);
        if (!card) continue;

        const treeBody = card.querySelector('.tree-body');
        if (!treeBody) continue;

        // Find and highlight matches in the tree
        highlightTree(treeBody, theme, words);

        // Update container height
        const container = card.querySelector('.tree-container');
        if (container) container.style.maxHeight = container.scrollHeight + 'px';
      }

      // Scroll to first match
      const firstMatch = document.querySelector('.search-match');
      if (firstMatch) firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 550);
  }, 50);
}

function highlightTree(treeBody, theme, words) {
  const subjects = treeBody.querySelectorAll('.tree-subject');
  let subjectIdx = 0;

  for (const disc of theme.disciplines) {
    const subjectEl = subjects[subjectIdx];
    subjectIdx++;
    if (!subjectEl) continue;

    const discMatch = words.every(w => normalize(disc.name).includes(w));
    let discHasChildMatch = false;

    const domainEls = subjectEl.querySelectorAll(':scope > .tree-children > .tree-domain');
    let domIdx = 0;

    for (const dom of disc.domains) {
      const domEl = domainEls[domIdx];
      domIdx++;
      if (!domEl) continue;

      const domMatch = words.every(w => normalize(dom.name).includes(w));
      let domHasChildMatch = false;

      const courseEls = domEl.querySelectorAll(':scope > .tree-children > .tree-leaf .tree-course-link');
      let courseIdx = 0;

      for (const course of dom.courses) {
        const courseEl = courseEls[courseIdx];
        courseIdx++;
        if (!courseEl) continue;

        if (words.every(w => normalize(course.name).includes(w))) {
          courseEl.classList.add('search-match');
          domHasChildMatch = true;
        }
      }

      if (domMatch || domHasChildMatch) {
        discHasChildMatch = true;
        // Expand domain
        const ch = domEl.querySelector(':scope > .tree-children');
        const chev = domEl.querySelector(':scope > .tree-node-header .tree-chevron');
        if (ch) ch.style.display = 'block';
        if (chev) chev.classList.add('open');
        if (domMatch) domEl.querySelector('.tree-node-header')?.classList.add('search-match');
      }
    }

    if (discMatch || discHasChildMatch) {
      // Expand discipline
      const ch = subjectEl.querySelector(':scope > .tree-children');
      const chev = subjectEl.querySelector(':scope > .tree-node-header .tree-chevron');
      if (ch) ch.style.display = 'block';
      if (chev) chev.classList.add('open');
      if (discMatch) subjectEl.querySelector('.tree-node-header')?.classList.add('search-match');
    }
  }
}

// ── Event delegation ──
document.getElementById('themesGrid').addEventListener('click', function(e) {
  // Close button
  if (e.target.closest('.tree-close')) {
    e.preventDefault();
    e.stopPropagation();
    collapseCard(e.target.closest('.theme-card'));
    return;
  }

  // Tree links → navigate normally
  if (e.target.closest('.tree-link')) return;

  // Toggle tree node
  const toggleHeader = e.target.closest('[data-toggle]');
  if (toggleHeader) {
    e.preventDefault();
    e.stopPropagation();
    const node = toggleHeader.closest('.tree-node');
    const children = node.querySelector(':scope > .tree-children');
    const chevron = toggleHeader.querySelector('.tree-chevron');
    if (children.style.display === 'none') {
      children.style.display = 'block';
      chevron.classList.add('open');
    } else {
      children.style.display = 'none';
      chevron.classList.remove('open');
    }
    updateTreeHeight(node);
    return;
  }

  // Card click → expand/collapse
  const card = e.target.closest('.theme-card');
  if (!card) return;
  e.preventDefault();

  if (card.classList.contains('expanded')) {
    collapseCard(card);
    return;
  }

  expandCard(card);
});

// ── Toolbar events ──
document.getElementById('btnOpenAll').addEventListener('click', openAllCards);
document.getElementById('btnCloseAll').addEventListener('click', closeAllCards);

let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const val = this.value;
  searchTimer = setTimeout(() => performSearch(val), 200);
});

// ── Init ──
async function init() {
  const cached = sessionStorage.getItem('curiosita_cards');
  if (cached) {
    try {
      const { data, ts } = JSON.parse(cached);
      if (Date.now() - ts < 10 * 60 * 1000) {
        treeData = data;
        finalize();
        return;
      }
    } catch(e) {}
  }

  treeData = await buildTree();
  try { sessionStorage.setItem('curiosita_cards', JSON.stringify({ data: treeData, ts: Date.now() })); } catch(e) {}
  finalize();
}

function finalize() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('themesGrid').style.display = '';
  document.getElementById('statsBadge').style.display = '';

  renderGrid();

  // Count stats
  let d = 0, dm = 0, c = 0;
  for (const t of treeData.themes) {
    d += t.disciplines.length;
    for (const disc of t.disciplines) {
      dm += disc.domains.length;
      for (const dom of disc.domains) c += dom.courses.length;
    }
  }
  document.getElementById('sbDisc').textContent = d;
  document.getElementById('sbDom').textContent = dm;
  document.getElementById('sbCours').textContent = c;

  isReady = true;
}

init();
</script>
