<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Tous les cours — Curiosita">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Tous les cours — Curiosita</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=2">
<style>
/* ── Page layout ── */
.page-header {
  padding: 6rem 3rem 1.5rem;
  max-width: 1100px;
  margin: 0 auto;
}
.page-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.page-sub {
  color: var(--muted);
  font-size: 0.92rem;
}

/* ── Toolbar ── */
.toolbar {
  position: sticky;
  top: 52px;
  z-index: 90;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.6rem 3rem;
  background: rgba(12,12,14,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.toolbar-search {
  position: relative;
  flex: 0 1 320px;
}
.toolbar-search .ts-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.75rem;
  pointer-events: none;
}
.toolbar-search input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.82rem;
  padding: 0.4rem 0.6rem 0.4rem 2rem;
  outline: none;
  transition: border-color 0.2s;
}
.toolbar-search input:focus {
  border-color: var(--accent);
}
.tool-sep {
  width: 1px;
  height: 18px;
  background: var(--border);
  margin: 0 0.15rem;
}
.tool-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.75rem;
  padding: 0.35rem 0.7rem;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.3rem;
  transition: all 0.2s;
  white-space: nowrap;
}
.tool-btn:hover {
  border-color: var(--accent);
  color: var(--text);
}
.search-count {
  font-size: 0.72rem;
  color: var(--muted);
  margin-left: 0.3rem;
}

/* ── Theme pills bar ── */
.theme-pills {
  display: flex;
  gap: 0.5rem;
  padding: 0.8rem 3rem;
  max-width: 100%;
  overflow-x: auto;
  scrollbar-width: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.theme-pills::-webkit-scrollbar { display: none; }

.theme-pill {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
  flex-shrink: 0;
}
.theme-pill:hover {
  border-color: var(--pill-color, var(--accent));
  background: var(--surface2);
}
.theme-pill.active {
  border-color: var(--pill-color, var(--accent));
  background: var(--surface2);
  box-shadow: inset 0 -2px 0 var(--pill-color, var(--accent));
}

.pill-icon { font-size: 1rem; }
.pill-name {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--text);
}
.theme-pill.active .pill-name { color: var(--pill-color, var(--accent)); }

.pill-count {
  font-size: 0.62rem;
  color: var(--muted);
  padding: 0.1rem 0.4rem;
  background: var(--surface2);
  border-radius: 3px;
}
.theme-pill.active .pill-count {
  background: rgba(255,255,255,0.06);
}

/* ── Stats badge ── */
.stats-badge {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 80;
  display: flex;
  gap: 1.2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 1.2rem;
}
.sb-item { text-align: center; }
.sb-val {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.3rem;
  color: var(--accent);
}
.sb-lab {
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

/* ── Tree wrapper ── */
.tree-wrap {
  max-width: 1100px;
  margin: 1.5rem auto 6rem;
  padding: 0 3rem;
}

/* ── Tree nodes ── */
.t-node { position: relative; }

.t-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 0.5rem;
  border-radius: 5px;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}
.t-row:hover { background: var(--surface2); }

/* Chevron */
.t-chev {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.5rem;
  color: var(--muted);
  transition: transform 0.2s ease;
}
.t-chev.open { transform: rotate(90deg); }
/* Leaf placeholder (no chevron) */
.t-chev-spacer { width: 16px; flex-shrink: 0; }

/* Icon */
.t-icon { font-size: 1rem; flex-shrink: 0; }

/* Name */
.t-name {
  font-size: 0.88rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.t-name-link {
  font-size: 0.88rem;
  color: var(--text);
  text-decoration: none;
  transition: color 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.t-name-link:hover { color: var(--accent); }

/* Count badge */
.t-count {
  font-size: 0.62rem;
  color: var(--muted);
  margin-left: auto;
  letter-spacing: 0.03em;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Children container */
.t-kids {
  display: none;
  padding-left: 1.2rem;
  margin-left: 0.5rem;
  border-left: 1px solid var(--border);
}
.t-kids.open { display: block; }

/* ── Level-specific styles ── */

/* Level 0: Themes */
.t-theme > .t-row { padding: 0.6rem 0.5rem; }
.t-theme > .t-row .t-icon { font-size: 1.3rem; }
.t-theme > .t-row .t-name {
  font-family: 'Playfair Display', serif;
  font-weight: 900;
  font-size: 1.15rem;
  letter-spacing: -0.01em;
}
.t-theme > .t-row .t-count {
  font-size: 0.68rem;
  padding: 0.15rem 0.5rem;
  background: var(--surface2);
  border-radius: 3px;
}
.t-theme + .t-theme { margin-top: 0.15rem; }

/* Level 1: Disciplines */
.t-disc > .t-row .t-name {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 0.95rem;
}

/* Level 2: Domains */
.t-dom > .t-row .t-name-link {
  font-size: 0.85rem;
}

/* Level 3: Courses (leaves) */
.t-course > .t-row {
  padding: 0.2rem 0.5rem;
  cursor: default;
}
.t-course > .t-row .t-name-link {
  font-size: 0.8rem;
  color: var(--muted);
}
.t-course > .t-row .t-name-link:hover {
  color: var(--accent);
}
.t-course > .t-row .t-bullet {
  color: var(--border);
  font-size: 0.5rem;
  flex-shrink: 0;
  width: 16px;
  text-align: center;
}

/* ── Colored theme accent lines ── */
.t-theme > .t-kids {
  border-left-color: var(--theme-color, var(--border));
}

/* ── Status indicators ── */
.t-status {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.t-status-ok { background: var(--green); }
.t-status-wip { background: #ff9800; }

/* Mini progress bar in count badges */
.t-progress {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.62rem;
  color: var(--muted);
  margin-left: auto;
  flex-shrink: 0;
  white-space: nowrap;
}
.t-progress-bar {
  width: 32px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.t-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}
.t-progress-fill.complete { background: var(--green); }
.t-progress-fill.partial { background: #ff9800; }

/* Pill progress */
.pill-progress {
  width: 28px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}
.pill-progress-fill {
  height: 100%;
  border-radius: 2px;
}

/* ── Search highlights ── */
.t-row.search-match { background: rgba(232,201,122,0.08); }
.t-row.search-match .t-name,
.t-row.search-match .t-name-link { color: var(--accent); }
.t-row.search-dim { opacity: 0.25; }

/* ── Loading ── */
.page-loading {
  text-align: center;
  padding: 4rem 2rem;
  max-width: 1100px;
  margin: 0 auto;
}
.loading-spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 0.8rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.85rem; color: var(--muted); }
.loading-sub { font-size: 0.7rem; color: var(--muted); opacity: 0.6; margin-top: 0.2rem; }

/* ── No results ── */
.no-results {
  text-align: center;
  padding: 3rem 2rem;
  display: none;
}
.no-results-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.no-results-text { color: var(--muted); font-size: 0.9rem; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .page-header { padding: 5.5rem 1.5rem 1rem; }
  .page-title { font-size: 1.6rem; }
  .toolbar { padding: 0.5rem 1rem; gap: 0.4rem; }
  .toolbar-search { flex: 1; }
  .tool-btn span { display: none; }
  .theme-pills { padding: 0.6rem 1rem; gap: 0.4rem; }
  .theme-pill { padding: 0.4rem 0.7rem; }
  .pill-name { font-size: 0.7rem; }
  .tree-wrap { padding: 0 1rem; margin-bottom: 4rem; }
  .stats-badge { display: none; }
}
@media (max-width: 480px) {
  .page-header { padding: 5rem 1rem 0.8rem; }
  .tree-wrap { padding: 0 0.5rem; }
  .t-kids { padding-left: 0.8rem; margin-left: 0.35rem; }
  .t-theme > .t-row .t-name { font-size: 1rem; }
  .t-count { display: none; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Curiosita.</a>
  <div class="breadcrumb">
    <a href="index.html">Accueil</a> › <span>Tous les cours</span>
  </div>
</nav>

<div class="page-header">
  <h1 class="page-title">Tous les cours</h1>
  <p class="page-sub">Explorez l'ensemble des disciplines, domaines et cours disponibles.</p>
</div>

<div class="toolbar" id="toolbar">
  <div class="toolbar-search">
    <span class="ts-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un cours, un domaine…" autocomplete="off">
  </div>
  <span class="search-count" id="searchCount"></span>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btnOpenAll">📂 <span>Tout ouvrir</span></button>
  <button class="tool-btn" id="btnCloseAll">📁 <span>Tout fermer</span></button>
</div>

<div class="theme-pills" id="themePills" style="display:none"></div>

<div class="page-loading" id="loadingState">
  <div class="loading-spinner"></div>
  <div class="loading-text">Construction de l'arborescence…</div>
  <div class="loading-sub" id="loadingProgress">Chargement des thèmes</div>
</div>

<div class="tree-wrap" id="treeWrap" style="display:none"></div>

<div class="no-results" id="noResults">
  <div class="no-results-icon">🔎</div>
  <div class="no-results-text">Aucun résultat trouvé</div>
</div>

<div class="stats-badge" id="statsBadge" style="display:none">
  <div class="sb-item"><div class="sb-val" id="sbDisc">0</div><div class="sb-lab">Disciplines</div></div>
  <div class="sb-item"><div class="sb-val" id="sbDom">0</div><div class="sb-lab">Domaines</div></div>
  <div class="sb-item"><div class="sb-val" id="sbCours">0</div><div class="sb-lab">Cours</div></div>
  <div class="sb-item"><div class="sb-val" id="sbPct" style="font-size:1rem">0%</div><div class="sb-lab">Complet</div></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   TOUS LES COURS — Arbre dépliable
   Themes → Disciplines → Domaines → Cours
   ═══════════════════════════════════════════════ */

const THEMES = [
  { page: 'sciences-exactes.html', name: 'Sciences exactes & Informatique', icon: '🔬', color: '#4fc3f7' },
  { page: 'sciences-nature.html', name: 'Sciences de la nature', icon: '🌱', color: '#7ae8d8' },
  { page: 'sciences-humaines.html', name: 'Sciences humaines & sociales', icon: '🌍', color: '#7ae88a' },
  { page: 'lettres-langues.html', name: 'Lettres, Langues & Philosophie', icon: '📚', color: '#9b7ae8' },
  { page: 'arts-culture.html', name: 'Arts & Culture', icon: '🎨', color: '#e87a7a' },
  { page: 'droit-politique.html', name: 'Droit, Politique & Société', icon: '⚖️', color: '#e87a9b' },
  { page: 'savoir-faire.html', name: 'Savoir-faire & Vie pratique', icon: '🔧', color: '#8ae87a' }
];

// ── State ──
let treeData = null;

// ── Data fetching ──
async function fetchDoc(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return new DOMParser().parseFromString(await r.text(), 'text/html');
}

function resolveUrl(href, base) {
  if (href.startsWith('/') || href.startsWith('http')) return href;
  const dir = base.includes('/') ? base.substring(0, base.lastIndexOf('/') + 1) : '';
  return dir + href;
}

function extractCards(doc, base) {
  const out = [];
  doc.querySelectorAll('.course-card[href]').forEach(c => {
    const href = c.getAttribute('href');
    const name = c.querySelector('h3')?.textContent?.trim();
    const icon = c.querySelector('.course-icon')?.textContent?.trim() || '';
    if (name && href) out.push({ name, url: resolveUrl(href, base), icon });
  });
  return out;
}

async function buildTree() {
  const prog = document.getElementById('loadingProgress');
  const themes = [];

  prog.textContent = 'Chargement des thèmes…';
  const themeResults = await Promise.allSettled(THEMES.map(async t => {
    const node = { ...t, disciplines: [] };
    try {
      const doc = await fetchDoc(t.page);
      for (const c of extractCards(doc, t.page)) {
        if (c.url.endsWith('-page.html'))
          node.disciplines.push({ name: c.name, url: c.url, icon: c.icon, color: t.color, domains: [] });
      }
    } catch(e) {}
    return node;
  }));
  for (const r of themeResults) if (r.status === 'fulfilled') themes.push(r.value);

  prog.textContent = 'Chargement des disciplines…';
  const discFetches = [];
  for (const theme of themes) {
    for (const disc of theme.disciplines) {
      discFetches.push(fetchDoc(disc.url).then(doc => {
        disc.domains = extractCards(doc, disc.url).map(h => ({
          name: h.name, url: h.url, icon: h.icon, color: disc.color, courses: []
        }));
      }).catch(() => {}));
    }
  }
  await Promise.allSettled(discFetches);

  prog.textContent = 'Chargement des cours…';
  const hubFetches = [];
  for (const theme of themes)
    for (const disc of theme.disciplines)
      for (const dom of disc.domains)
        hubFetches.push(fetchDoc(dom.url).then(doc => {
          dom.courses = extractCards(doc, dom.url).map(c => ({
            name: c.name, url: c.url, icon: c.icon
          }));
        }).catch(() => {}));
  await Promise.allSettled(hubFetches);

  // Check course file existence via HEAD requests
  prog.textContent = 'Vérification des fichiers…';
  const allCourses = [];
  for (const t of themes)
    for (const d of t.disciplines)
      for (const dm of d.domains)
        for (const c of dm.courses) allCourses.push(c);

  const BATCH = 30;
  for (let i = 0; i < allCourses.length; i += BATCH) {
    const batch = allCourses.slice(i, i + BATCH);
    await Promise.allSettled(batch.map(async c => {
      try {
        const r = await fetch(c.url, { method: 'HEAD' });
        c.exists = r.ok;
      } catch(e) { c.exists = false; }
    }));
  }

  return { themes };
}

// ── Helpers: count existing courses ──
function countExisting(courses) {
  return courses.filter(c => c.exists).length;
}

function domainStats(dom) {
  const total = dom.courses.length;
  const ok = countExisting(dom.courses);
  return { total, ok };
}

function discStats(disc) {
  let total = 0, ok = 0;
  for (const dom of disc.domains) {
    const s = domainStats(dom);
    total += s.total; ok += s.ok;
  }
  return { total, ok };
}

function themeStats(theme) {
  let total = 0, ok = 0;
  for (const disc of theme.disciplines) {
    const s = discStats(disc);
    total += s.total; ok += s.ok;
  }
  return { total, ok };
}

function progressHtml(ok, total) {
  const pct = total > 0 ? Math.round(ok / total * 100) : 100;
  const cls = pct === 100 ? 'complete' : 'partial';
  return `<span class="t-progress">
    <span class="t-progress-bar"><span class="t-progress-fill ${cls}" style="width:${pct}%"></span></span>
    ${ok}/${total}
  </span>`;
}

// ── Render tree ──
function renderTree() {
  const wrap = document.getElementById('treeWrap');
  wrap.innerHTML = '';

  for (const theme of treeData.themes) {
    const ts = themeStats(theme);

    const themeEl = document.createElement('div');
    themeEl.className = 't-node t-theme';
    themeEl.style.cssText = `--theme-color:${theme.color}`;
    themeEl.innerHTML = `
      <div class="t-row" data-toggle>
        <span class="t-chev">&#9654;</span>
        <span class="t-icon">${theme.icon}</span>
        <span class="t-name">${theme.name}</span>
        ${progressHtml(ts.ok, ts.total)}
      </div>
      <div class="t-kids"></div>`;

    const kidsContainer = themeEl.querySelector('.t-kids');

    for (const disc of theme.disciplines) {
      const ds = discStats(disc);
      const discEl = document.createElement('div');
      discEl.className = 't-node t-disc';
      discEl.innerHTML = `
        <div class="t-row" data-toggle>
          <span class="t-chev">&#9654;</span>
          <span class="t-icon">${disc.icon || '📖'}</span>
          <a href="${disc.url}" class="t-name-link" onclick="event.stopPropagation()">${disc.name}</a>
          ${progressHtml(ds.ok, ds.total)}
        </div>
        <div class="t-kids"></div>`;

      const discKids = discEl.querySelector('.t-kids');

      for (const dom of disc.domains) {
        const dms = domainStats(dom);
        const domEl = document.createElement('div');
        domEl.className = 't-node t-dom';
        domEl.innerHTML = `
          <div class="t-row" data-toggle>
            <span class="t-chev">&#9654;</span>
            <a href="${dom.url}" class="t-name-link" onclick="event.stopPropagation()">${dom.name}</a>
            ${progressHtml(dms.ok, dms.total)}
          </div>
          <div class="t-kids"></div>`;

        const domKids = domEl.querySelector('.t-kids');

        for (const course of dom.courses) {
          const statusCls = course.exists ? 't-status-ok' : 't-status-wip';
          const courseEl = document.createElement('div');
          courseEl.className = 't-node t-course';
          courseEl.innerHTML = `
            <div class="t-row">
              <span class="t-status ${statusCls}"></span>
              <a href="${course.url}" class="t-name-link">${course.name}</a>
            </div>`;
          domKids.appendChild(courseEl);
        }

        discKids.appendChild(domEl);
      }

      kidsContainer.appendChild(discEl);
    }

    wrap.appendChild(themeEl);
  }
}

// ── Toggle expand/collapse ──
document.getElementById('treeWrap').addEventListener('click', function(e) {
  const row = e.target.closest('[data-toggle]');
  if (!row) return;

  // Don't toggle if clicking a link
  if (e.target.closest('a')) return;

  e.preventDefault();
  const node = row.closest('.t-node');
  const kids = node.querySelector(':scope > .t-kids');
  const chev = row.querySelector('.t-chev');

  if (kids.classList.contains('open')) {
    kids.classList.remove('open');
    chev.classList.remove('open');
  } else {
    kids.classList.add('open');
    chev.classList.add('open');
  }
});

// ── Open / Close all ──
function openAll() {
  document.querySelectorAll('.t-kids').forEach(k => k.classList.add('open'));
  document.querySelectorAll('.t-chev').forEach(c => c.classList.add('open'));
}

function closeAll() {
  document.querySelectorAll('.t-kids').forEach(k => k.classList.remove('open'));
  document.querySelectorAll('.t-chev').forEach(c => c.classList.remove('open'));
}

document.getElementById('btnOpenAll').addEventListener('click', openAll);
document.getElementById('btnCloseAll').addEventListener('click', closeAll);

// ── Search ──
function normalize(s) { return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

function resetPillsView() {
  // Show all themes and reset active pill to "Tous"
  document.querySelectorAll('.t-theme').forEach(el => el.style.display = '');
  const pills = document.querySelectorAll('.theme-pill');
  pills.forEach(p => p.classList.remove('active'));
  if (pills[0]) pills[0].classList.add('active');
}

function performSearch(query) {
  const q = normalize(query.trim());
  const countEl = document.getElementById('searchCount');
  const noRes = document.getElementById('noResults');
  const wrap = document.getElementById('treeWrap');

  // Clear previous highlights
  wrap.querySelectorAll('.search-match, .search-dim').forEach(el => {
    el.classList.remove('search-match', 'search-dim');
  });

  if (!q) {
    countEl.textContent = '';
    noRes.style.display = 'none';
    wrap.style.display = '';
    // Reset to "Tous" view
    resetPillsView();
    closeAll();
    return;
  }

  const words = q.split(/\s+/).filter(Boolean);
  let totalMatches = 0;

  // Reset view: show all themes, close all
  resetPillsView();
  closeAll();

  // Walk through all course data and match
  const themeEls = wrap.querySelectorAll(':scope > .t-theme');
  let themeIdx = 0;

  for (const theme of treeData.themes) {
    const themeEl = themeEls[themeIdx++];
    if (!themeEl) continue;
    let themeHasMatch = false;

    const discEls = themeEl.querySelectorAll(':scope > .t-kids > .t-disc');
    let discIdx = 0;

    for (const disc of theme.disciplines) {
      const discEl = discEls[discIdx++];
      if (!discEl) continue;
      let discHasMatch = false;
      const discMatch = words.every(w => normalize(disc.name).includes(w));

      const domEls = discEl.querySelectorAll(':scope > .t-kids > .t-dom');
      let domIdx = 0;

      for (const dom of disc.domains) {
        const domEl = domEls[domIdx++];
        if (!domEl) continue;
        let domHasMatch = false;
        const domMatch = words.every(w => normalize(dom.name).includes(w));

        const courseEls = domEl.querySelectorAll(':scope > .t-kids > .t-course');
        let courseIdx = 0;

        for (const course of dom.courses) {
          const courseEl = courseEls[courseIdx++];
          if (!courseEl) continue;

          if (words.every(w => normalize(course.name).includes(w))) {
            courseEl.querySelector('.t-row').classList.add('search-match');
            domHasMatch = true;
            totalMatches++;
          }
        }

        if (domMatch) {
          domEl.querySelector(':scope > .t-row').classList.add('search-match');
          domHasMatch = true;
          totalMatches++;
        }

        if (domHasMatch) {
          // Expand domain
          const dk = domEl.querySelector(':scope > .t-kids');
          const dc = domEl.querySelector(':scope > .t-row .t-chev');
          if (dk) dk.classList.add('open');
          if (dc) dc.classList.add('open');
          discHasMatch = true;
        }
      }

      if (discMatch) {
        discEl.querySelector(':scope > .t-row').classList.add('search-match');
        discHasMatch = true;
        totalMatches++;
      }

      if (discHasMatch) {
        // Expand discipline
        const dk = discEl.querySelector(':scope > .t-kids');
        const dc = discEl.querySelector(':scope > .t-row .t-chev');
        if (dk) dk.classList.add('open');
        if (dc) dc.classList.add('open');
        themeHasMatch = true;
      }
    }

    // Check theme name match
    if (words.every(w => normalize(theme.name).includes(w))) {
      themeEl.querySelector(':scope > .t-row').classList.add('search-match');
      themeHasMatch = true;
      totalMatches++;
    }

    if (themeHasMatch) {
      // Expand theme
      const tk = themeEl.querySelector(':scope > .t-kids');
      const tc = themeEl.querySelector(':scope > .t-row .t-chev');
      if (tk) tk.classList.add('open');
      if (tc) tc.classList.add('open');
    }
  }

  if (totalMatches === 0) {
    countEl.textContent = '0 résultat';
    noRes.style.display = 'block';
    wrap.style.display = 'none';
    return;
  }

  countEl.textContent = totalMatches + ' résultat' + (totalMatches > 1 ? 's' : '');
  noRes.style.display = 'none';
  wrap.style.display = '';

  // Dim non-matching rows at visible level
  wrap.querySelectorAll('.t-row').forEach(row => {
    if (!row.classList.contains('search-match')) {
      // Check if any ancestor or descendant has a match
      const node = row.closest('.t-node');
      const hasMatchChild = node.querySelector('.search-match');
      const hasMatchParent = row.closest('.t-node')?.parentElement?.closest('.t-node')?.querySelector(':scope > .t-row.search-match');
      if (!hasMatchChild && !hasMatchParent) {
        row.classList.add('search-dim');
      }
    }
  });

  // Scroll to first match
  const firstMatch = wrap.querySelector('.search-match');
  if (firstMatch) {
    setTimeout(() => firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
  }
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const val = this.value;
  searchTimer = setTimeout(() => performSearch(val), 200);
});

// ── Theme pills ──
function renderPills() {
  const bar = document.getElementById('themePills');
  bar.style.display = '';
  bar.innerHTML = '';

  // "Tous" pill
  const allPill = document.createElement('div');
  allPill.className = 'theme-pill active';
  allPill.dataset.index = '-1';
  allPill.innerHTML = `<span class="pill-icon">📋</span><span class="pill-name">Tous</span>`;
  bar.appendChild(allPill);

  // Global stats for "Tous" pill
  let globalOk = 0, globalTotal = 0;
  treeData.themes.forEach(t => { const s = themeStats(t); globalOk += s.ok; globalTotal += s.total; });
  const globalPct = globalTotal > 0 ? Math.round(globalOk / globalTotal * 100) : 100;
  allPill.innerHTML = `<span class="pill-icon">📋</span><span class="pill-name">Tous</span><span class="pill-count">${globalOk}/${globalTotal}</span>`;

  treeData.themes.forEach((theme, i) => {
    const ts = themeStats(theme);
    const pct = ts.total > 0 ? Math.round(ts.ok / ts.total * 100) : 100;
    const pill = document.createElement('div');
    pill.className = 'theme-pill';
    pill.style.cssText = `--pill-color:${theme.color}`;
    pill.dataset.index = i;
    pill.innerHTML = `
      <span class="pill-icon">${theme.icon}</span>
      <span class="pill-name">${theme.name.split(' & ')[0].split(', ')[0]}</span>
      <span class="pill-count">${ts.ok}/${ts.total}</span>
      <span class="pill-progress"><span class="pill-progress-fill" style="width:${pct}%;background:${pct===100?'var(--green)':'#ff9800'}"></span></span>`;
    bar.appendChild(pill);
  });
}

document.getElementById('themePills').addEventListener('click', function(e) {
  const pill = e.target.closest('.theme-pill');
  if (!pill) return;

  // Update active state
  this.querySelectorAll('.theme-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');

  const idx = parseInt(pill.dataset.index);
  const wrap = document.getElementById('treeWrap');
  const themeEls = wrap.querySelectorAll(':scope > .t-theme');

  if (idx === -1) {
    // "Tous" — show all themes, collapse all
    closeAll();
    themeEls.forEach(el => el.style.display = '');
    return;
  }

  // Show only the selected theme, expand it to level 1 (disciplines visible)
  closeAll();
  themeEls.forEach((el, i) => {
    if (i === idx) {
      el.style.display = '';
      // Expand theme
      const tk = el.querySelector(':scope > .t-kids');
      const tc = el.querySelector(':scope > .t-row .t-chev');
      if (tk) tk.classList.add('open');
      if (tc) tc.classList.add('open');
      // Scroll to it
      setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    } else {
      el.style.display = 'none';
    }
  });
});

// ── Init ──
async function init() {
  const cached = sessionStorage.getItem('curiosita_tree_v2');
  if (cached) {
    try {
      const { data, ts } = JSON.parse(cached);
      if (Date.now() - ts < 10 * 60 * 1000) {
        treeData = data;
        finalize();
        return;
      }
    } catch(e) {}
  }

  treeData = await buildTree();
  try { sessionStorage.setItem('curiosita_tree_v2', JSON.stringify({ data: treeData, ts: Date.now() })); } catch(e) {}
  finalize();
}

function finalize() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('treeWrap').style.display = '';
  document.getElementById('statsBadge').style.display = '';

  renderTree();
  renderPills();

  // Count stats
  let d = 0, dm = 0, c = 0, cOk = 0;
  for (const t of treeData.themes) {
    d += t.disciplines.length;
    for (const disc of t.disciplines) {
      dm += disc.domains.length;
      for (const dom of disc.domains) {
        c += dom.courses.length;
        cOk += countExisting(dom.courses);
      }
    }
  }
  document.getElementById('sbDisc').textContent = d;
  document.getElementById('sbDom').textContent = dm;
  document.getElementById('sbCours').textContent = cOk + '/' + c;
  document.getElementById('sbPct').textContent = c > 0 ? Math.round(cOk / c * 100) + '%' : '100%';
}

init();
